# DigitalOcean App Platform Configuration
# Deploy this app to DigitalOcean App Platform with managed PostgreSQL

name: iranazad-petition
services:
  - name: iranazad-app
    # Uncomment if deploying from GitHub:
    # github:
    #   repo: your-org/iranazad
    #   branch: main

    # For manual deployment or other git providers:
    source_dir: /
    dockerfile_path: Dockerfile

    # Health check configuration
    health_check:
      http_path: /api/health
      initial_delay_seconds: 30
      period_seconds: 10
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    # Instance configuration
    instance_count: 1
    instance_size_slug: basic-xxs  # Upgrade based on needs: basic-xs, basic-s, etc.

    # Environment variables
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: PETITION_HMAC_SECRET
        type: SECRET
        # IMPORTANT: Set this value in DigitalOcean dashboard after deployment
        # Generate with: openssl rand -base64 64
        # Do NOT deploy with a placeholder value
      - key: DATABASE_URL
        value: ${iranazad-db.DATABASE_URL}

# Managed PostgreSQL database
databases:
  - name: iranazad-db
    engine: PG
    version: "16"
    size: db-s-dev-database  # Upgrade based on needs: db-s-basic, db-s-dev, etc.
    production: false  # Set to true for production deployments
    # Backups are automatically enabled for production databases

# Optional: Add custom domain
# routes:
#   - path: /
#     preserve_path_prefix: false
