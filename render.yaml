# Render Deployment Configuration
# Full-stack deployment configuration for Render.com
# This configures both the web service and managed PostgreSQL database

services:
  - type: web
    name: iranazad-petition
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter  # Upgrade to pro or standard based on traffic needs
    healthCheckPath: /api/health
    autoDeploy: true
    # Run database migrations after successful deployment
    deployHook: pnpm db:migrate
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: PETITION_HMAC_SECRET
        generateValue: true  # Render will generate and store securely
      - key: DATABASE_URL
        fromDatabase:
          name: iranazad-db
          property: connectionString

databases:
  - name: iranazad-db
    databaseName: iranazad
    user: iranazad
    plan: starter  # PostgreSQL managed database
    # Enable connection pooling for better performance
    # Connection pooling is automatically available on Render
