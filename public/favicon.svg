<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Iran flag themed favicon">
  <defs>
    <clipPath id="flagClip">
      <rect x="4" y="4" width="56" height="56" rx="14" ry="14" />
    </clipPath>
    <linearGradient id="ring" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#239F40"/>
      <stop offset="0.5" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#DA0000"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" ry="14" fill="#e9e9e9"/>
  <g clip-path="url(#flagClip)">
    <rect x="4" y="4" width="56" height="18.66" fill="#239F40"/>
    <rect x="4" y="22.66" width="56" height="18.68" fill="#FFFFFF"/>
    <rect x="4" y="41.34" width="56" height="18.66" fill="#DA0000"/>
  </g>

  <circle cx="32" cy="32" r="9" fill="none" stroke="url(#ring)" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="3.2" fill="#f2f2f2" stroke="#b8b8b8" stroke-width="0.8"/>

  <rect x="4" y="4" width="56" height="56" rx="14" ry="14" fill="none" stroke="#8c8c8c" stroke-width="1.2"/>
</svg>